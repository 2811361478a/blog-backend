spring:
  application:
    name: blog-backend
  datasource:
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:blog_db}?useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:123456}
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.blog.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: ${PORT:8080}
  base-url: ${BASE_URL:http://localhost:8080}
upload:
  path: ${UPLOAD_PATH:/tmp/uploads/}

